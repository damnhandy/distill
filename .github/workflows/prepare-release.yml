name: Prepare Release

# Computes the Nix vendorHash for flake.nix, commits the update to main,
# and pushes the release tag — which triggers the release workflow.
#
# Prerequisites:
#   RELEASE_TOKEN secret — a fine-grained PAT or classic PAT with `contents: write`
#   scoped to this repository. Required to push to a protected main branch; if the
#   secret is absent the job falls back to the built-in GITHUB_TOKEN (which has
#   contents: write via the job's permissions block and works when main is unprotected).
#
# Usage: Actions → Prepare Release → Run workflow → enter version (e.g. v0.4.0)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.4.0)'
        required: true

jobs:
  prepare:
    name: Update vendorHash and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Assert dispatched from main
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "ERROR: This workflow must be dispatched from main (got ${{ github.ref }})" >&2
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          # Use RELEASE_TOKEN when available (needed to push to a protected main branch);
          # fall back to the built-in GITHUB_TOKEN so the checkout step never fails
          # with "Input required and not supplied: token" when the secret is absent.
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Compute vendorHash
        id: vendor-hash
        run: |
          set -euo pipefail
          # Reset to fakeHash so nix build outputs the real one regardless of current value.
          # Use # as delimiter to avoid conflict with | used for ERE alternation.
          sed -i -E 's#vendorHash = (pkgs\.lib\.fakeHash|"[^"]*");#vendorHash = pkgs.lib.fakeHash;#' flake.nix
          # nix build exits non-zero on a hash mismatch (expected). Capture output before
          # checking the result so pipefail does not abort before grep can extract the hash.
          NIX_OUTPUT=$(nix --extra-experimental-features "nix-command flakes" build 2>&1 || true)
          echo "=== nix build output ===" >&2
          echo "$NIX_OUTPUT" >&2
          echo "========================" >&2
          # awk extracts the first "got:" hash only (single-line, always exits 0 — no pipefail interaction).
          VENDOR_HASH=$(echo "$NIX_OUTPUT" | awk '/got:/ {sub(/.*got:[[:space:]]*/, ""); print; exit}')
          if [[ -z "$VENDOR_HASH" ]]; then
            echo "ERROR: could not extract vendorHash from nix build output" >&2
            exit 1
          fi
          echo "hash=${VENDOR_HASH}" >> "$GITHUB_OUTPUT"

      - name: Update flake.nix
        run: |
          sed -i "s|vendorHash = pkgs.lib.fakeHash;|vendorHash = \"${{ steps.vendor-hash.outputs.hash }}\";|" flake.nix

      - name: Commit and tag
        env:
          # Resolve the push token once so both git remote set-url and the push
          # commands use the same credential. RELEASE_TOKEN is preferred (bypasses
          # protected-branch rules); GITHUB_TOKEN is the fallback.
          PUSH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Explicitly embed credentials in the remote URL so git push does not
          # rely on the includeIf.gitdir credential file written by actions/checkout.
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git add flake.nix
          git diff --cached --quiet && echo "flake.nix unchanged, skipping commit" || \
            git commit -m "chore: update flake.nix vendorHash for ${{ inputs.version }}"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin main
          git push origin "${{ inputs.version }}"
