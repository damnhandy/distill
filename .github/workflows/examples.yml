name: Examples

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "internal/**"
      - "cmd/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "internal/**"
      - "cmd/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

jobs:
  build-examples:
    name: Build & Test Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        example:
          - name: rhel9-runtime
            spec: examples/rhel9-runtime/image.distill.yaml
            test: examples/rhel9-runtime/test.yaml
            tag: ghcr.io/damnhandy/rhel9-distilled:latest
            scan-fail-on: critical
          - name: rhel9-aws-devtools
            spec: examples/rhel9-aws-devtools/image.distill.yaml
            test: examples/rhel9-aws-devtools/test.yaml
            tag: ghcr.io/damnhandy/rhel9-aws-devtools:latest
            scan-fail-on: critical
          - name: centos-stream9-runtime
            spec: examples/centos-stream9-runtime/image.distill.yaml
            test: examples/centos-stream9-runtime/test.yaml
            tag: ghcr.io/damnhandy/centos-stream9-distilled:latest
            scan-fail-on: critical
          - name: rocky9-runtime
            spec: examples/rocky9-runtime/image.distill.yaml
            test: examples/rocky9-runtime/test.yaml
            tag: ghcr.io/damnhandy/rocky9-distilled:latest
            scan-fail-on: critical
          - name: alma9-runtime
            spec: examples/alma9-runtime/image.distill.yaml
            test: examples/alma9-runtime/test.yaml
            tag: ghcr.io/damnhandy/alma9-distilled:latest
            scan-fail-on: critical
          - name: ubuntu-runtime
            spec: examples/ubuntu-runtime/image.distill.yaml
            test: examples/ubuntu-runtime/test.yaml
            tag: ghcr.io/damnhandy/ubuntu-distilled:latest
            scan-fail-on: critical
          # scan-fail-on: high — distill binary v0.3.0 was compiled with Go 1.26.0,
          # which has CVE-2026-27143 (critical in stdlib). go.mod now requires
          # Go 1.26.2 (the fix); revert to "critical" after the next release.
          - name: distill-ubi9
            spec: examples/distill-ubi9/image.distill.yaml
            test: examples/distill-ubi9/test.yaml
            tag: ghcr.io/damnhandy/distill-ubi9:latest
            scan-fail-on: high
          - name: distill-ubuntu
            spec: examples/distill-ubuntu/image.distill.yaml
            test: examples/distill-ubuntu/test.yaml
            tag: ghcr.io/damnhandy/distill-ubuntu:latest
            scan-fail-on: high

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Build distill CLI
        run: >
          go build
          -ldflags="-s -w -X github.com/damnhandy/distill/cmd.Version=ci"
          -o distill
          .

      - name: Build example image
        env:
          DISTILL_CONTAINER_CLI: docker
        run: ./distill build --spec ${{ matrix.example.spec }} --platform linux/amd64

      - name: Install container-structure-test
        if: matrix.example.test != ''
        run: |
          curl -fsSL -o container-structure-test \
            https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-amd64
          chmod +x container-structure-test
          sudo mv container-structure-test /usr/local/bin/container-structure-test

      - name: Run structure tests
        if: matrix.example.test != ''
        run: container-structure-test test --image ${{ matrix.example.tag }} --config ${{ matrix.example.test }}

      - name: Install syft and grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Publish image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DISTILL_CONTAINER_CLI: docker
        run: ./distill publish --skip-build --spec ${{ matrix.example.spec }} --platform linux/amd64

      - name: Generate SBOM
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: ./distill attest --output sbom-${{ matrix.example.name }}.spdx.json ${{ matrix.example.tag }}

      - name: Scan for CVEs
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: ./distill scan --fail-on ${{ matrix.example.scan-fail-on }} ${{ matrix.example.tag }}
