name: Examples

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "internal/**"
      - "cmd/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "internal/**"
      - "cmd/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

jobs:
  build-examples:
    name: Build & Test Examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - name: rhel9-runtime
            spec: examples/rhel9-runtime/image.yaml
            test: examples/rhel9-runtime/test.yaml
            tag: distill-example-rhel9-runtime:ci
          - name: debian-runtime
            spec: examples/debian-runtime/image.yaml
            tag: distill-example-debian-runtime:ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build distill CLI
        run: >
          go build
          -ldflags="-s -w -X github.com/damnhandy/distill/cmd.Version=ci"
          -o distill
          .

      - name: Build example image
        env:
          DISTILL_CONTAINER_CLI: docker
        run: ./distill build --spec ${{ matrix.example.spec }} --tag ${{ matrix.example.tag }}

      - name: Install container-structure-test
        if: matrix.example.test != ''
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run structure tests
        if: matrix.example.test != ''
        run: container-structure-test test --image ${{ matrix.example.tag }} --config ${{ matrix.example.test }}

      - name: Scan for CVEs
        uses: anchore/scan-action@v3
        with:
          image: ${{ matrix.example.tag }}
          fail-build: true
          severity-cutoff: critical
