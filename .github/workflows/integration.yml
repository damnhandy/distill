name: CLI Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Verifies the composite action installs distill correctly and puts it on PATH.
  # Uses a local path reference so we test the current action code, not @main.
  setup-action-smoke:
    name: Action Self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install distill via setup-distill action
        id: setup
        uses: ./.github/actions/setup-distill
        with:
          version: v0.3.1

      - name: Verify version is reported
        run: distill version

      - name: "root --help lists core subcommands"
        run: |
          output=$(distill --help)
          echo "$output"
          echo "$output" | grep -q "build"
          echo "$output" | grep -q "scan"
          echo "$output" | grep -q "doctor"

      - name: "doctor exits 0"
        run: distill doctor

  cli-smoke:
    name: CLI Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build distill CLI
        run: >
          go build
          -ldflags="-s -w -X github.com/damnhandy/distill/cmd.Version=ci"
          -o distill
          .

      # ── distill doctor ──────────────────────────────────────────────────────
      # cosign / syft / grype are not installed on the runner, so doctor will
      # show missing rows — that is expected. The test verifies the command
      # exits 0 and produces tabular output.
      - name: "doctor: exits 0 and prints table header"
        run: |
          output=$(./distill doctor)
          echo "$output"
          echo "$output" | grep -q "TOOL"
          echo "$output" | grep -q "STATUS"

      # ── help output ─────────────────────────────────────────────────────────
      - name: "root --help lists all subcommands"
        run: |
          output=$(./distill --help)
          echo "$output"
          echo "$output" | grep -q "build"
          echo "$output" | grep -q "scan"
          echo "$output" | grep -q "attest"
          echo "$output" | grep -q "provenance"
          echo "$output" | grep -q "doctor"

      - name: "build --help exits 0"
        run: ./distill build --help

      - name: "scan --help exits 0"
        run: ./distill scan --help

      - name: "attest --help exits 0"
        run: ./distill attest --help

      - name: "provenance --help exits 0"
        run: ./distill provenance --help

      - name: "doctor --help exits 0"
        run: ./distill doctor --help

      # ── flag validation ──────────────────────────────────────────────────────
      - name: "build without --spec exits non-zero"
        run: |
          if ./distill build 2>/dev/null; then
            echo "ERROR: expected non-zero exit" && exit 1
          fi

      - name: "build with missing spec file exits non-zero"
        run: |
          if ./distill build --spec /nonexistent/path.yaml 2>/dev/null; then
            echo "ERROR: expected non-zero exit" && exit 1
          fi

      - name: "build with invalid YAML exits non-zero"
        run: |
          echo "this: is: not: valid: yaml: [" > /tmp/bad.yaml
          if ./distill build --spec /tmp/bad.yaml 2>/dev/null; then
            echo "ERROR: expected non-zero exit" && exit 1
          fi

      - name: "scan without image argument or --spec exits non-zero"
        run: |
          if ./distill scan 2>/dev/null; then
            echo "ERROR: expected non-zero exit" && exit 1
          fi

      - name: "attest without image argument or --spec exits non-zero"
        run: |
          if ./distill attest 2>/dev/null; then
            echo "ERROR: expected non-zero exit" && exit 1
          fi

      - name: "provenance without image argument or --spec exits non-zero"
        run: |
          if ./distill provenance 2>/dev/null; then
            echo "ERROR: expected non-zero exit" && exit 1
          fi

      - name: "write spec with no destination for --spec no-destination tests"
        run: |
          cat > /tmp/nodest.yaml <<'EOF'
          name: test-image
          source:
            image: debian:bookworm-slim
            releasever: "bookworm"
          contents:
            packages:
              - bash
          EOF

      - name: "scan --spec with no destination exits non-zero"
        run: |
          if ./distill scan --spec /tmp/nodest.yaml 2>/dev/null; then
            echo "ERROR: expected non-zero exit for missing destination" && exit 1
          fi

      - name: "attest --spec with no destination exits non-zero"
        run: |
          if ./distill attest --spec /tmp/nodest.yaml 2>/dev/null; then
            echo "ERROR: expected non-zero exit for missing destination" && exit 1
          fi

      - name: "provenance --spec with no destination exits non-zero"
        run: |
          if ./distill provenance --spec /tmp/nodest.yaml 2>/dev/null; then
            echo "ERROR: expected non-zero exit for missing destination" && exit 1
          fi
