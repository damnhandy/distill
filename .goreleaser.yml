version: 2

project_name: distill

before:
  hooks:
    - go mod tidy

builds:
  - id: distill
    main: .
    binary: distill
    ldflags:
      - -s -w
      - -X github.com/damnhandy/distill/cmd.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: distill
    builds: [distill]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: distill
    artifacts: archive

signs:
  - id: distill
    cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

changelog:
  use: github
  sort: asc
  groups:
    - title: "New features"
      regexp: "^feat"
      order: 0
    - title: "Bug fixes"
      regexp: "^fix"
      order: 1
    - title: "Documentation"
      regexp: "^docs"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^ci"
      - "^test"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: damnhandy
    name: distill
  prerelease: auto
  draft: false
