version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck        # unhandled errors
    - govet           # suspicious constructs (printf format, etc.)
    - staticcheck     # broad set of static analysis checks
    - unused          # unused code

    # Style / formatting
    - goimports       # enforces goimports formatting and import grouping

    # Test quality
    - testifylint     # correct use of testify assertion functions

    # Common bugs
    - nilnil          # functions returning (nil, nil) are almost always wrong
    - noctx           # HTTP requests without context
    - bodyclose       # unclosed HTTP response bodies

settings:
  goimports:
    # Keep internal imports in a separate group after third-party.
    local-prefixes:
      - github.com/damnhandy/distill

  testifylint:
    enable-all: true

exclusions:
  rules:
    # Test files are allowed to shadow package-level variables.
    - linters: [govet]
      path: "_test\\.go"
      text: "shadow"
